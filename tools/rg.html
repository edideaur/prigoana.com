<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rapidgator Link Extractor</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:#eee;
    padding:20px;
}
textarea{
    width:100%;
    height:220px;
    margin-bottom:15px;
    background:#1e1e1e;
    color:#fff;
    border:1px solid #444;
    padding:10px;
}
button{
    padding:10px 20px;
    margin-right:10px;
    background:#4CAF50;
    border:none;
    color:white;
    cursor:pointer;
}
button:hover{
    opacity:0.9;
}
</style>
</head>
<body>

<h2>Rapidgator Link Extractor</h2>

<textarea id="input" placeholder="Paste your list here..."></textarea>

<button onclick="extract()">Extract Links</button>
<button onclick="copyOutput()">Copy Output</button>

<textarea id="output" placeholder="Rapidgator links will appear here..."></textarea>

<script>
function extract(){
    const text = document.getElementById("input").value;

    const links = text.match(/https?:\/\/rapidgator\.net\/[^\s]+/gi) || [];

    const cleaned = links.filter(link => !link.includes("article/premium"));

    document.getElementById("output").value = cleaned.join("\n");
}

function copyOutput(){
    const out = document.getElementById("output");
    out.select();
    document.execCommand("copy");
}
</script>

</body>
</html>
